name: Publish

on:
  push:
    branches: [main]
    paths:
      - 'packages/core/src/**'
      - 'packages/server/src/**'
      - 'packages/web/src/**'
      - 'packages/cli/**'
      - 'package.json'
      - '.github/workflows/publish.yml'

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      tag: ${{ steps.create-tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test (bun)
        run: bun test packages/core packages/server packages/web

      - name: Build CLI bundle
        run: bun run build:cli

      - name: Test CLI (Node.js)
        run: node --test packages/cli/tests/*.test.mjs

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        run: |
          node -e "
            const fs = require('fs');
            for (const pkg_path of ['packages/cli/package.json', 'packages/web/package.json']) {
              const pkg = JSON.parse(fs.readFileSync(pkg_path, 'utf8'));
              const [major,minor,patch] = pkg.version.split('.').map(Number);
              pkg.version = major+'.'+minor+'.'+(patch+1);
              fs.writeFileSync(pkg_path, JSON.stringify(pkg, null, 2) + '\n');
              console.log(pkg_path + ': v' + pkg.version);
            }
          "

      - name: Build web library
        run: BUILD_LIB=1 bunx --bun vite build
        working-directory: packages/web

      - name: Publish CLI to npm
        working-directory: packages/cli
        run: npm publish --provenance --access public

      - name: Publish web to npm
        working-directory: packages/web
        run: npm publish --provenance --access public

      - name: Commit and push version bump
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          git add packages/cli/package.json packages/web/package.json
          git commit -m "chore: bump cli+web version to ${VERSION} [skip ci]"
          git pull --rebase
          git push

      - name: Create and push version tag
        id: create-tag
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

  release:
    needs: publish
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-latest
            artifact: apv-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-latest
            artifact: apv-linux-arm64
          - target: bun-darwin-arm64
            os: macos-latest
            artifact: apv-darwin-arm64
          - target: bun-darwin-x64
            os: macos-latest
            artifact: apv-darwin-x64
          - target: bun-windows-x64
            os: windows-latest
            artifact: apv-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.publish.outputs.tag }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web frontend
        run: bun run build:web

      - name: Generate web asset manifest
        run: bun scripts/generate-web-assets.ts

      - name: Compile standalone binary
        run: bun build --compile --target ${{ matrix.target }} packages/server/src/standalone.ts --outfile ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  github-release:
    needs: [publish, release]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.publish.outputs.tag }}
          generate_release_notes: true
          files: artifacts/*
