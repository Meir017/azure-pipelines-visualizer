name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-latest
            artifact: apv-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-latest
            artifact: apv-linux-arm64
          - target: bun-darwin-arm64
            os: macos-latest
            artifact: apv-darwin-arm64
          - target: bun-darwin-x64
            os: macos-latest
            artifact: apv-darwin-x64
          - target: bun-windows-x64
            os: windows-latest
            artifact: apv-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web frontend
        run: bun run build:web

      - name: Generate web asset manifest
        run: bun scripts/generate-web-assets.ts

      - name: Compile standalone binary
        run: bun build --compile --target ${{ matrix.target }} packages/server/src/standalone.ts --outfile ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
