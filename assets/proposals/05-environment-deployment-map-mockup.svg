  <text x="680" y="28" font-family="Segoe UI, sans-serif" font-size="11" fill="#94A3B8">MyProject • contoso</text>

  <!-- Column headers -->
  <text x="55" y="68" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#64748B" text-anchor="middle">PIPELINES</text>
  <text x="250" y="68" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#64748B" text-anchor="middle">STAGES</text>
  <text x="500" y="68" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#64748B" text-anchor="middle">ENVIRONMENTS</text>

