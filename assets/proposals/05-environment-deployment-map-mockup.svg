  <!-- ===================== -->

  <!-- Pipeline 1: Build-Deploy-Web -->
  <rect x="10" y="85" width="130" height="50" rx="8" fill="white" stroke="#3B82F6" stroke-width="2" filter="url(#shadow5)"/>
  <rect x="10" y="85" width="5" height="50" rx="3" fill="#3B82F6"/>
  <text x="24" y="105" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#1E3A5F">Build-Deploy-Web</text>
  <text x="24" y="120" font-family="Segoe UI, sans-serif" font-size="9" fill="#94A3B8">web-app repo</text>

  <!-- Pipeline 2: Build-Deploy-API -->
  <rect x="10" y="165" width="130" height="50" rx="8" fill="white" stroke="#3B82F6" stroke-width="2" filter="url(#shadow5)"/>
  <rect x="10" y="165" width="5" height="50" rx="3" fill="#3B82F6"/>
  <text x="24" y="185" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#1E3A5F">Build-Deploy-API</text>
  <text x="24" y="200" font-family="Segoe UI, sans-serif" font-size="9" fill="#94A3B8">api-service repo</text>

