  <rect x="60" y="195" width="170" height="56" rx="8" fill="#fff" stroke="#107c10" stroke-width="2"/>
  <circle cx="80" cy="215" r="8" fill="#107c10"/>
  <text x="80" y="219" fill="#fff" font-size="10" text-anchor="middle">✓</text>
  <text x="95" y="215" fill="#323130" font-size="11" font-weight="600">Build-Core #456</text>
  <text x="95" y="234" fill="#605e5c" font-size="10">✓ Succeeded · 4m 12s</text>

  <!-- Arrow 1→2 -->
  <line x1="230" y1="223" x2="280" y2="223" stroke="#0078d4" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0078d4"/>
    </marker>
  </defs>

  <!-- Node 2: Integration-Tests -->
  <rect x="285" y="195" width="195" height="56" rx="8" fill="#fff" stroke="#107c10" stroke-width="2"/>
  <circle cx="305" cy="215" r="8" fill="#107c10"/>
  <text x="305" y="219" fill="#fff" font-size="10" text-anchor="middle">✓</text>
  <text x="320" y="215" fill="#323130" font-size="11" font-weight="600">Integration-Tests #789</text>
  <text x="320" y="234" fill="#605e5c" font-size="10">✓ Succeeded · 12m 05s</text>

  <!-- Arrow 2→3 -->
  <line x1="480" y1="223" x2="530" y2="223" stroke="#0078d4" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Node 3: This Build (highlighted) -->
  <rect x="535" y="191" width="195" height="64" rx="8" fill="#deecf9" stroke="#0078d4" stroke-width="3"/>
  <circle cx="555" cy="215" r="8" fill="#0078d4"/>
  <text x="555" y="219" fill="#fff" font-size="10" text-anchor="middle">✓</text>
  <text x="572" y="215" fill="#0078d4" font-size="11" font-weight="700">This Build #1001</text>
  <text x="572" y="234" fill="#605e5c" font-size="10">✓ Succeeded · 7m 23s</text>
  <text x="572" y="248" fill="#0078d4" font-size="9" font-weight="600">◀ YOU ARE HERE</text>

  <!-- === Native Build Tabs === -->
  <rect x="16" y="282" width="768" height="32" rx="0" fill="#fff"/>
  <rect x="16" y="312" width="768" height="2" fill="#edebe9"/>
  <rect x="24" y="310" width="64" height="4" fill="#0078d4" rx="2"/>
  <text x="56" y="302" fill="#0078d4" font-size="12" font-weight="600" text-anchor="middle">Summary</text>
