  <rect x="16" y="154" width="768" height="120" rx="4" fill="#fff" filter="url(#shadow)"/>
  <rect x="16" y="154" width="768" height="28" rx="4" fill="#faf9f8"/>
  <rect x="16" y="172" width="768" height="2" fill="#edebe9"/>
  <text x="36" y="173" fill="#323130" font-size="12" font-weight="600">▾ Trigger Chain</text>
  <rect x="680" y="158" width="72" height="16" rx="8" fill="#0078d4"/>
  <text x="716" y="169" fill="#fff" font-size="9" text-anchor="middle" font-weight="600">INJECTED</text>

