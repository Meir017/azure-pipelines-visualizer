<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Segoe UI, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="adoHeader" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0078d4"/>
      <stop offset="100%" stop-color="#106ebe"/>
    </linearGradient>
    <linearGradient id="fabGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0078d4"/>
      <stop offset="100%" stop-color="#005a9e"/>
    </linearGradient>
  </defs>

  <!-- Page background -->
  <rect width="800" height="500" fill="#f3f2f1" rx="4"/>

  <!-- ADO top navigation bar -->
  <rect width="800" height="36" fill="#1b1a19" rx="4"/>
  <rect width="800" height="32" y="4" fill="#1b1a19"/>
  <text x="20" y="24" fill="#fff" font-size="13" font-weight="600">Azure DevOps</text>
  <text x="160" y="24" fill="#a19f9d" font-size="12">MyOrg / MyProject / Pipelines</text>

  <!-- === INJECTED: "Why did this run?" Explainer Banner === -->
  <rect x="16" y="46" width="768" height="42" rx="4" fill="#deecf9" stroke="#0078d4" stroke-width="1"/>
  <text x="40" y="63" fill="#0078d4" font-size="11" font-weight="700">ℹ WHY DID THIS RUN?</text>
  <text x="40" y="79" fill="#323130" font-size="12">
    Triggered by Pipeline
    <tspan font-weight="700">'Build-Core' #456</tspan>
     → CI push to
    <tspan font-weight="700">main</tspan>
     by
    <tspan font-weight="700">@alice</tspan>
     (commit a1b2c3d)
  </text>
  <!-- collapse chevron -->
  <text x="760" y="71" fill="#0078d4" font-size="16" text-anchor="middle">▴</text>
  <!-- INJECTED label -->
  <rect x="636" y="49" width="72" height="16" rx="8" fill="#0078d4"/>
  <text x="672" y="60" fill="#fff" font-size="9" text-anchor="middle" font-weight="600">INJECTED</text>

  <!-- === Native Build Header === -->
  <rect x="16" y="96" width="768" height="50" rx="4" fill="#fff" filter="url(#shadow)"/>
  <circle cx="40" cy="121" r="12" fill="#107c10"/>
  <text x="40" y="126" fill="#fff" font-size="14" text-anchor="middle">✓</text>
  <text x="60" y="115" fill="#323130" font-size="15" font-weight="700">Deploy-Staging #1001</text>
  <text x="60" y="132" fill="#605e5c" font-size="11">Completed · 7m 23s · main · a1b2c3d</text>
  <!-- Cross-project trigger badges (injected) -->
  <rect x="530" y="106" width="115" height="22" rx="11" fill="#f3f2f1" stroke="#8a8886" stroke-width="1"/>
  <circle cx="542" cy="117" r="4" fill="#107c10"/>
  <text x="550" y="121" fill="#323130" font-size="10">OtherProj/Deploy</text>
  <rect x="652" y="106" width="120" height="22" rx="11" fill="#f3f2f1" stroke="#8a8886" stroke-width="1"/>
  <circle cx="664" cy="117" r="4" fill="#d83b01"/>
  <text x="672" y="121" fill="#323130" font-size="10">Shared/Notify-Svc</text>

