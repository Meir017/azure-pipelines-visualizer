  <text x="310" y="302" fill="#605e5c" font-size="12" text-anchor="middle">Tests</text>

  <!-- === Native Build Content (simplified) === -->
  <rect x="16" y="320" width="768" height="148" rx="4" fill="#fff" filter="url(#shadow)"/>
  <!-- Stage rows -->
  <text x="36" y="345" fill="#323130" font-size="12" font-weight="600">Stages</text>
  <rect x="36" y="354" width="728" height="30" rx="4" fill="#f3f2f1"/>
  <circle cx="52" cy="369" r="6" fill="#107c10"/>
  <text x="66" y="373" fill="#323130" font-size="11">Build</text>
  <text x="700" y="373" fill="#605e5c" font-size="11" text-anchor="end">2m 14s</text>

  <rect x="36" y="390" width="728" height="30" rx="4" fill="#f3f2f1"/>
  <circle cx="52" cy="405" r="6" fill="#107c10"/>
  <text x="66" y="409" fill="#323130" font-size="11">Test</text>
  <text x="700" y="409" fill="#605e5c" font-size="11" text-anchor="end">3m 48s</text>

  <rect x="36" y="426" width="728" height="30" rx="4" fill="#f3f2f1"/>
  <circle cx="52" cy="441" r="6" fill="#107c10"/>
  <text x="66" y="445" fill="#323130" font-size="11">Deploy</text>
  <text x="700" y="445" fill="#605e5c" font-size="11" text-anchor="end">1m 21s</text>

  <!-- === INJECTED: Floating Action Button (Timeline View) === -->
  <circle cx="752" cy="464" r="24" fill="url(#fabGrad)" filter="url(#shadow)"/>
  <text x="752" y="460" fill="#fff" font-size="16" text-anchor="middle">⏱</text>
  <text x="752" y="474" fill="#fff" font-size="7" text-anchor="middle" font-weight="600">Timeline</text>

  <!-- FAB tooltip -->
  <rect x="650" y="445" width="88" height="20" rx="4" fill="#323130"/>
  <text x="694" y="459" fill="#fff" font-size="9" text-anchor="middle">Timeline View</text>
  <polygon points="738,455 744,455 741,460" fill="#323130"/>
</svg>
