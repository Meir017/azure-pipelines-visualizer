<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0078d4"/>
      <stop offset="100%" stop-color="#005a9e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f5f5f5" rx="8"/>

  <!-- Header Bar -->
  <rect width="800" height="48" fill="url(#headerGrad)" rx="8"/>
  <rect y="24" width="800" height="24" fill="url(#headerGrad)"/>
  <text x="16" y="30" fill="white" font-size="16" font-weight="600">Build Timeline — Gantt View</text>
  <text x="620" y="30" fill="white" font-size="11" opacity="0.9">Build #4821 · 4m 32s</text>

  <!-- Summary badges -->
  <rect x="16" y="58" width="90" height="28" rx="4" fill="#2da44e" opacity="0.12"/>
  <text x="24" y="76" fill="#2da44e" font-size="11" font-weight="600">✓ Succeeded</text>
  <rect x="116" y="58" width="100" height="28" rx="4" fill="#0078d4" opacity="0.1"/>
  <text x="124" y="76" fill="#0078d4" font-size="11">3 Stages · 7 Jobs</text>
  <rect x="226" y="58" width="120" height="28" rx="4" fill="#0078d4" opacity="0.1"/>
  <text x="234" y="76" fill="#0078d4" font-size="11">Critical Path: 3m 10s</text>

  <!-- Toggle buttons -->
  <rect x="500" y="60" width="85" height="24" rx="12" fill="#0078d4" stroke="none"/>
  <text x="512" y="76" fill="white" font-size="10">Critical Path</text>
  <rect x="592" y="60" width="72" height="24" rx="12" fill="white" stroke="#d0d0d0"/>
  <text x="604" y="76" fill="#555" font-size="10">Show Gaps</text>

  <!-- Time Axis -->
  <line x1="160" y1="96" x2="590" y2="96" stroke="#ccc" stroke-width="1"/>
  <text x="160" y="106" fill="#888" font-size="9" text-anchor="middle">0:00</text>
  <text x="246" y="106" fill="#888" font-size="9" text-anchor="middle">1:00</text>
  <text x="332" y="106" fill="#888" font-size="9" text-anchor="middle">2:00</text>
  <text x="418" y="106" fill="#888" font-size="9" text-anchor="middle">3:00</text>
  <text x="504" y="106" fill="#888" font-size="9" text-anchor="middle">4:00</text>
  <text x="590" y="106" fill="#888" font-size="9" text-anchor="middle">4:32</text>
  <!-- Tick marks -->
  <line x1="160" y1="92" x2="160" y2="96" stroke="#aaa"/>
  <line x1="246" y1="92" x2="246" y2="96" stroke="#aaa"/>
  <line x1="332" y1="92" x2="332" y2="96" stroke="#aaa"/>
  <line x1="418" y1="92" x2="418" y2="96" stroke="#aaa"/>
  <line x1="504" y1="92" x2="504" y2="96" stroke="#aaa"/>
  <line x1="590" y1="92" x2="590" y2="96" stroke="#aaa"/>
  <!-- Grid lines -->
  <line x1="246" y1="96" x2="246" y2="380" stroke="#eee" stroke-dasharray="4,4"/>
  <line x1="332" y1="96" x2="332" y2="380" stroke="#eee" stroke-dasharray="4,4"/>
  <line x1="418" y1="96" x2="418" y2="380" stroke="#eee" stroke-dasharray="4,4"/>
  <line x1="504" y1="96" x2="504" y2="380" stroke="#eee" stroke-dasharray="4,4"/>

  <!-- === STAGE 1: Build === -->
  <rect x="10" y="112" width="144" height="20" rx="3" fill="#0078d4" opacity="0.08"/>
  <text x="16" y="126" fill="#0078d4" font-size="11" font-weight="700">▾ Build</text>

  <!-- Job: Build Web -->
  <text x="30" y="150" fill="#444" font-size="10">Build Web</text>
  <rect x="160" y="138" width="172" height="16" rx="3" fill="#2da44e" filter="url(#shadow)"/>
  <text x="168" y="150" fill="white" font-size="9">npm build (2m 0s)</text>
  <!-- Critical path highlight -->
  <rect x="160" y="138" width="172" height="16" rx="3" fill="none" stroke="#0078d4" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- Job: Build API -->
  <text x="30" y="174" fill="#444" font-size="10">Build API</text>
  <rect x="160" y="162" width="130" height="16" rx="3" fill="#2da44e" filter="url(#shadow)"/>
  <text x="168" y="174" fill="white" font-size="9">dotnet build (1m 30s)</text>

  <!-- Job: Lint -->
  <text x="30" y="198" fill="#444" font-size="10">Lint</text>
  <rect x="160" y="186" width="60" height="16" rx="3" fill="#2da44e" filter="url(#shadow)"/>
  <text x="168" y="198" fill="white" font-size="9">42s</text>

  <!-- === STAGE 2: Test === -->
  <rect x="10" y="214" width="144" height="20" rx="3" fill="#0078d4" opacity="0.08"/>
  <text x="16" y="228" fill="#0078d4" font-size="11" font-weight="700">▾ Test</text>

  <!-- Job: Unit Tests -->
  <text x="30" y="252" fill="#444" font-size="10">Unit Tests</text>
  <rect x="340" y="240" width="86" height="16" rx="3" fill="#2da44e" filter="url(#shadow)"/>
  <text x="348" y="252" fill="white" font-size="9">1m 0s</text>
  <rect x="340" y="240" width="86" height="16" rx="3" fill="none" stroke="#0078d4" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- Job: Integration Tests -->
  <text x="30" y="276" fill="#444" font-size="10">Integration</text>
  <rect x="340" y="264" width="108" height="16" rx="3" fill="#cf222e" filter="url(#shadow)"/>
  <text x="348" y="276" fill="white" font-size="9">Failed (1m 15s)</text>

  <!-- Job: E2E Tests -->
  <text x="30" y="300" fill="#444" font-size="10">E2E Tests</text>
  <rect x="340" y="288" width="65" height="16" rx="3" fill="#8b949e" filter="url(#shadow)"/>
  <text x="348" y="300" fill="white" font-size="9">Skipped</text>

  <!-- === STAGE 3: Deploy === -->
  <rect x="10" y="316" width="144" height="20" rx="3" fill="#0078d4" opacity="0.08"/>
  <text x="16" y="330" fill="#0078d4" font-size="11" font-weight="700">▾ Deploy</text>

  <!-- Job: Deploy Staging -->
  <text x="30" y="354" fill="#444" font-size="10">Deploy Staging</text>
  <rect x="456" y="342" width="65" height="16" rx="3" fill="#2da44e" filter="url(#shadow)"/>
  <text x="462" y="354" fill="white" font-size="9">45s</text>
  <rect x="456" y="342" width="65" height="16" rx="3" fill="none" stroke="#0078d4" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- Job: Deploy Prod -->
  <text x="30" y="378" fill="#444" font-size="10">Deploy Prod</text>
  <rect x="530" y="366" width="55" height="16" rx="3" fill="#d4a72c" filter="url(#shadow)"/>
  <text x="536" y="378" fill="white" font-size="9">Canceled</text>

  <!-- Critical path connecting lines -->
  <line x1="332" y1="146" x2="340" y2="248" stroke="#0078d4" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="426" y1="248" x2="456" y2="350" stroke="#0078d4" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- ======= DETAIL PANEL (Right) ======= -->
  <rect x="605" y="96" width="185" height="290" rx="6" fill="white" filter="url(#shadow)" stroke="#e0e0e0"/>
  <rect x="605" y="96" width="185" height="32" rx="6" fill="#f8f8f8"/>
  <rect x="605" y="120" width="185" height="8" fill="#f8f8f8"/>
  <text x="616" y="116" fill="#333" font-size="12" font-weight="600">Integration Tests</text>

  <!-- Status badge -->
  <rect x="616" y="136" width="50" height="18" rx="9" fill="#cf222e" opacity="0.12"/>
  <text x="624" y="149" fill="#cf222e" font-size="10" font-weight="600">Failed</text>

  <text x="616" y="172" fill="#888" font-size="9">Start</text>
  <text x="680" y="172" fill="#333" font-size="9">12:03:22 PM</text>
  <text x="616" y="188" fill="#888" font-size="9">Finish</text>
  <text x="680" y="188" fill="#333" font-size="9">12:04:37 PM</text>
  <text x="616" y="204" fill="#888" font-size="9">Duration</text>
  <text x="680" y="204" fill="#333" font-size="9">1m 15s</text>
  <line x1="616" y1="212" x2="780" y2="212" stroke="#eee"/>

  <text x="616" y="228" fill="#888" font-size="9">Agent</text>
  <text x="680" y="228" fill="#333" font-size="9">ubuntu-pool-3</text>
  <text x="616" y="244" fill="#888" font-size="9">Errors</text>
  <rect x="680" y="235" width="16" height="14" rx="3" fill="#cf222e" opacity="0.15"/>
  <text x="684" y="246" fill="#cf222e" font-size="9" font-weight="600">2</text>
  <text x="616" y="260" fill="#888" font-size="9">Warnings</text>
  <rect x="680" y="251" width="16" height="14" rx="3" fill="#d4a72c" opacity="0.15"/>
  <text x="684" y="262" fill="#d4a72c" font-size="9" font-weight="600">5</text>

  <line x1="616" y1="270" x2="780" y2="270" stroke="#eee"/>
  <text x="616" y="286" fill="#888" font-size="9" font-weight="600">Issues</text>
  <rect x="616" y="292" width="164" height="14" rx="2" fill="#cf222e" opacity="0.06"/>
  <text x="620" y="302" fill="#cf222e" font-size="8">✗ Assert.Equal failed: expected 200</text>
  <rect x="616" y="310" width="164" height="14" rx="2" fill="#cf222e" opacity="0.06"/>
  <text x="620" y="320" fill="#cf222e" font-size="8">✗ Timeout waiting for DB conn</text>

  <!-- Action buttons -->
  <rect x="616" y="336" width="72" height="24" rx="4" fill="#0078d4"/>
  <text x="630" y="352" fill="white" font-size="10">View Logs</text>
  <rect x="696" y="336" width="82" height="24" rx="4" fill="white" stroke="#0078d4"/>
  <text x="704" y="352" fill="#0078d4" font-size="10">Open in ADO</text>

  <!-- Legend -->
  <rect x="10" y="395" width="590" height="36" rx="4" fill="white" filter="url(#shadow)"/>
  <rect x="20" y="405" width="12" height="12" rx="2" fill="#2da44e"/>
  <text x="36" y="415" fill="#555" font-size="9">Succeeded</text>
  <rect x="100" y="405" width="12" height="12" rx="2" fill="#cf222e"/>
  <text x="116" y="415" fill="#555" font-size="9">Failed</text>
  <rect x="160" y="405" width="12" height="12" rx="2" fill="#d4a72c"/>
  <text x="176" y="415" fill="#555" font-size="9">Canceled</text>
  <rect x="236" y="405" width="12" height="12" rx="2" fill="#8b949e"/>
  <text x="252" y="415" fill="#555" font-size="9">Skipped</text>
  <rect x="310" y="405" width="12" height="12" rx="2" fill="none" stroke="#0078d4" stroke-width="2" stroke-dasharray="3,1"/>
  <text x="326" y="415" fill="#555" font-size="9">Critical Path</text>

  <!-- Footer -->
  <text x="400" y="465" fill="#aaa" font-size="10" text-anchor="middle">Azure Pipelines Visualizer — Build Timeline Gantt View</text>
  <text x="400" y="480" fill="#ccc" font-size="9" text-anchor="middle">Mockup · Not final design</text>
</svg>
