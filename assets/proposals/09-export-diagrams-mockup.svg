<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <filter id="menuShadow" x="-8%" y="-4%" width="116%" height="116%">
      <feDropShadow dx="2" dy="4" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Title bar -->
  <rect width="800" height="44" fill="#1e293b" rx="8" ry="8"/>
  <rect y="20" width="800" height="24" fill="#1e293b"/>
  <text x="20" y="28" fill="#f8fafc" font-size="14" font-weight="600">Azure Pipelines Visualizer — Template Tree</text>
  <text x="630" y="28" fill="#94a3b8" font-size="11">MyProject / web-app-pipeline</text>

  <!-- ==================== TEMPLATE TREE (background, slightly dimmed) ==================== -->

  <!-- Root node -->
  <g filter="url(#shadow)" opacity="0.7">
    <rect x="40" y="100" width="160" height="44" rx="6" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="56" y="120" fill="#1e293b" font-size="10" font-weight="600">📄 azure-pipelines.yml</text>
    <text x="56" y="134" fill="#64748b" font-size="8">Root pipeline</text>
  </g>

  <!-- Node: build-template -->
  <g filter="url(#shadow)" opacity="0.7">
    <rect x="60" y="170" width="150" height="40" rx="6" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="76" y="190" fill="#1e293b" font-size="10" font-weight="600">📄 build-template.yml</text>
    <text x="76" y="202" fill="#64748b" font-size="8">stages/build</text>
  </g>

  <!-- Node: test-template -->
  <g filter="url(#shadow)" opacity="0.7">
    <rect x="60" y="228" width="150" height="40" rx="6" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="76" y="248" fill="#1e293b" font-size="10" font-weight="600">📄 test-template.yml</text>
    <text x="76" y="260" fill="#64748b" font-size="8">stages/test</text>
  </g>

  <!-- Node: deploy-staging -->
  <g filter="url(#shadow)" opacity="0.7">
    <rect x="240" y="170" width="150" height="40" rx="6" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="256" y="190" fill="#1e293b" font-size="10" font-weight="600">📄 deploy-staging.yml</text>
    <text x="256" y="202" fill="#64748b" font-size="8">stages/deploy</text>
  </g>

  <!-- Node: deploy-prod -->
  <g filter="url(#shadow)" opacity="0.7">
    <rect x="240" y="228" width="160" height="40" rx="6" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="256" y="248" fill="#1e293b" font-size="10" font-weight="600">📄 deploy-production.yml</text>
    <text x="256" y="260" fill="#64748b" font-size="8">stages/deploy</text>
  </g>

  <!-- Node: notifications -->
  <g filter="url(#shadow)" opacity="0.7">
    <rect x="60" y="286" width="150" height="40" rx="6" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="76" y="306" fill="#1e293b" font-size="10" font-weight="600">📄 notifications.yml</text>
    <text x="76" y="318" fill="#64748b" font-size="8">jobs/notify</text>
  </g>

  <!-- Tree edges -->
  <line x1="120" y1="144" x2="120" y2="170" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="120" y1="144" x2="120" y2="228" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="120" y1="144" x2="120" y2="286" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="210" y1="190" x2="240" y2="190" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="210" y1="248" x2="240" y2="248" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>

  <!-- ==================== EXPORT BUTTON ==================== -->
  <g filter="url(#shadow)">
    <rect x="688" y="52" width="90" height="32" rx="6" fill="#6366f1" cursor="pointer"/>
    <text x="720" y="72" fill="white" font-size="11" font-weight="600">⬇ Export</text>
  </g>

  <!-- ==================== DROPDOWN MENU (open) ==================== -->
  <g filter="url(#menuShadow)">
    <rect x="598" y="88" width="190" height="290" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>

    <!-- Header -->
    <text x="614" y="110" fill="#1e293b" font-size="11" font-weight="700">Export As</text>
    <line x1="610" y1="118" x2="780" y2="118" stroke="#e2e8f0" stroke-width="1"/>

    <!-- Mermaid (highlighted/hovered) -->
    <rect x="604" y="122" width="178" height="28" rx="4" fill="#eef2ff"/>
    <text x="622" y="140" fill="#1e293b" font-size="11">🧜‍♀️</text>
    <text x="644" y="140" fill="#1e293b" font-size="11" font-weight="500">Mermaid</text>
    <text x="776" y="140" fill="#94a3b8" font-size="9" text-anchor="end">.md</text>

    <!-- Draw.io -->
    <rect x="604" y="152" width="178" height="28" rx="4" fill="transparent"/>
    <text x="622" y="170" fill="#1e293b" font-size="11">📐</text>
    <text x="644" y="170" fill="#1e293b" font-size="11">Draw.io</text>
    <text x="776" y="170" fill="#94a3b8" font-size="9" text-anchor="end">.drawio</text>

    <!-- PlantUML -->
    <rect x="604" y="182" width="178" height="28" rx="4" fill="transparent"/>
    <text x="622" y="200" fill="#1e293b" font-size="11">🌱</text>
    <text x="644" y="200" fill="#1e293b" font-size="11">PlantUML</text>
    <text x="776" y="200" fill="#94a3b8" font-size="9" text-anchor="end">.puml</text>

    <!-- Divider -->
    <line x1="610" y1="215" x2="780" y2="215" stroke="#e2e8f0" stroke-width="1"/>

    <!-- PNG -->
    <rect x="604" y="219" width="178" height="28" rx="4" fill="transparent"/>
    <text x="622" y="237" fill="#1e293b" font-size="11">🖼️</text>
    <text x="644" y="237" fill="#1e293b" font-size="11">PNG Image</text>
    <text x="776" y="237" fill="#94a3b8" font-size="9" text-anchor="end">.png</text>

    <!-- SVG -->
    <rect x="604" y="249" width="178" height="28" rx="4" fill="transparent"/>
    <text x="622" y="267" fill="#1e293b" font-size="11">📐</text>
    <text x="644" y="267" fill="#1e293b" font-size="11">SVG Image</text>
    <text x="776" y="267" fill="#94a3b8" font-size="9" text-anchor="end">.svg</text>

    <!-- Divider -->
    <line x1="610" y1="282" x2="780" y2="282" stroke="#e2e8f0" stroke-width="1"/>

    <!-- Copy as Mermaid -->
    <rect x="604" y="286" width="178" height="28" rx="4" fill="transparent"/>
    <text x="622" y="304" fill="#1e293b" font-size="11">📋</text>
    <text x="644" y="304" fill="#1e293b" font-size="11">Copy as Mermaid</text>

    <!-- Copy as Image -->
    <rect x="604" y="316" width="178" height="28" rx="4" fill="transparent"/>
    <text x="622" y="334" fill="#1e293b" font-size="11">📋</text>
    <text x="644" y="334" fill="#1e293b" font-size="11">Copy as Image</text>

    <!-- Copy as Text -->
    <rect x="604" y="346" width="178" height="28" rx="4" fill="transparent"/>
    <text x="622" y="364" fill="#1e293b" font-size="11">📋</text>
    <text x="644" y="364" fill="#1e293b" font-size="11">Copy as Text</text>
  </g>

  <!-- ==================== MERMAID PREVIEW PANEL ==================== -->
  <g filter="url(#shadow)">
    <rect x="40" y="348" width="520" height="140" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>

    <!-- Preview header -->
    <rect x="40" y="348" width="520" height="32" rx="8" fill="#f8fafc"/>
    <rect x="40" y="364" width="520" height="16" fill="#f8fafc"/>
    <text x="56" y="369" fill="#1e293b" font-size="11" font-weight="700">Preview — Mermaid</text>
    <rect x="518" y="354" width="32" height="20" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="534" y="368" fill="#64748b" font-size="10" text-anchor="middle">✕</text>

    <!-- Code block -->
    <rect x="52" y="386" width="496" height="66" rx="4" fill="#1e293b"/>
    <text x="64" y="402" fill="#94a3b8" font-size="9" font-family="Consolas, monospace">```mermaid</text>
    <text x="64" y="414" fill="#e2e8f0" font-size="9" font-family="Consolas, monospace">graph LR</text>
    <text x="64" y="426" fill="#e2e8f0" font-size="9" font-family="Consolas, monospace">    A[azure-pipelines.yml] --&gt; B[build-template.yml]</text>
    <text x="64" y="438" fill="#e2e8f0" font-size="9" font-family="Consolas, monospace">    A --&gt; C[test-template.yml]</text>
    <text x="64" y="450" fill="#94a3b8" font-size="9" font-family="Consolas, monospace">```</text>

    <!-- Action buttons -->
    <rect x="52" y="460" width="130" height="22" rx="4" fill="#6366f1"/>
    <text x="117" y="475" fill="white" font-size="10" text-anchor="middle" font-weight="600">📋 Copy to Clipboard</text>

    <rect x="190" y="460" width="110" height="22" rx="4" fill="white" stroke="#6366f1" stroke-width="1.5"/>
    <text x="245" y="475" fill="#6366f1" font-size="10" text-anchor="middle" font-weight="600">⬇ Download .md</text>
  </g>

  <!-- ==================== KEYBOARD SHORTCUT HINT ==================== -->
  <rect x="40" y="68" width="110" height="22" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="83" fill="#64748b" font-size="9">⌘E Export shortcut</text>
</svg>
