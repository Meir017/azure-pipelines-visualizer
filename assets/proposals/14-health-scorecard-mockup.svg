<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Segoe UI, sans-serif">
  <defs>
    <linearGradient id="gaugeGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d83b01"/>
      <stop offset="40%" stop-color="#ffc83d"/>
      <stop offset="100%" stop-color="#107c10"/>
    </linearGradient>
    <filter id="cardShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <clipPath id="sparkClip">
      <rect x="32" y="430" width="736" height="50"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#faf9f8" rx="6"/>

  <!-- Title bar -->
  <rect width="800" height="44" fill="#fff" rx="6" filter="url(#cardShadow)"/>
  <rect width="800" height="40" y="4" fill="#fff"/>
  <text x="24" y="28" fill="#323130" font-size="16" font-weight="700">Pipeline Health Scorecard</text>
  <text x="280" y="28" fill="#605e5c" font-size="12">Deploy-Staging · Last 30 days · Updated 3m ago</text>

  <!-- ============ LEFT SIDE: Gauge ============ -->
  <rect x="16" y="56" width="320" height="360" rx="8" fill="#fff" filter="url(#cardShadow)"/>

  <!-- Gauge arc background (270°) -->
  <path d="M 176 340 A 120 120 0 1 1 176.001 340" fill="none" stroke="#edebe9" stroke-width="20" stroke-linecap="round"
        transform="rotate(135, 176, 240)"/>

  <!-- Gauge arc colored fill — 78% of 270° ≈ 210.6° -->
  <!-- Arc from 135° to 345.6° (78% of 270°) -->
  <path d="M 91.15 324.85 A 120 120 0 1 1 259.23 228.73" fill="none" stroke="url(#gaugeGreen)" stroke-width="20" stroke-linecap="round"/>

  <!-- Score text -->
  <text x="176" y="230" fill="#323130" font-size="52" font-weight="700" text-anchor="middle">78</text>
  <text x="176" y="255" fill="#605e5c" font-size="14" text-anchor="middle">out of 100</text>

  <!-- Score label -->
  <rect x="136" y="268" width="80" height="24" rx="12" fill="#fff4ce"/>
  <text x="176" y="284" fill="#986f0b" font-size="11" font-weight="600" text-anchor="middle">GOOD</text>

  <!-- Gauge min/max labels -->
  <text x="68" y="358" fill="#a19f9d" font-size="10" text-anchor="middle">0</text>
  <text x="284" y="358" fill="#a19f9d" font-size="10" text-anchor="middle">100</text>

  <!-- Gauge ticks text -->
  <text x="176" y="380" fill="#605e5c" font-size="11" text-anchor="middle">Score trending stable →</text>

  <!-- ============ RIGHT SIDE: Breakdown Cards ============ -->

  <!-- Card 1: Success Rate -->
  <rect x="352" y="56" width="432" height="56" rx="6" fill="#fff" filter="url(#cardShadow)"/>
  <rect x="352" y="56" width="4" height="56" rx="2" fill="#107c10"/>
  <text x="372" y="77" fill="#323130" font-size="13" font-weight="600">Success Rate</text>
  <text x="372" y="98" fill="#605e5c" font-size="11">93 of 101 builds succeeded</text>
  <text x="700" y="77" fill="#107c10" font-size="22" font-weight="700" text-anchor="end">92%</text>
  <rect x="712" y="64" width="56" height="22" rx="4" fill="#dff6dd"/>
  <text x="740" y="80" fill="#107c10" font-size="11" font-weight="600" text-anchor="middle">● 92</text>

  <!-- Card 2: Avg Duration -->
  <rect x="352" y="120" width="432" height="56" rx="6" fill="#fff" filter="url(#cardShadow)"/>
  <rect x="352" y="120" width="4" height="56" rx="2" fill="#ffc83d"/>
  <text x="372" y="141" fill="#323130" font-size="13" font-weight="600">Avg Duration</text>
  <text x="372" y="162" fill="#605e5c" font-size="11">Trending slower · was 10m, now 12m</text>
  <text x="700" y="141" fill="#986f0b" font-size="22" font-weight="700" text-anchor="end">12m</text>
  <!-- Trend arrow up (degrading = slower = bad) -->
  <rect x="712" y="128" width="56" height="22" rx="4" fill="#fff4ce"/>
  <text x="740" y="144" fill="#986f0b" font-size="11" font-weight="600" text-anchor="middle">↑ 60</text>

  <!-- Card 3: Flaky Tests -->
  <rect x="352" y="184" width="432" height="56" rx="6" fill="#fff" filter="url(#cardShadow)"/>
  <rect x="352" y="184" width="4" height="56" rx="2" fill="#107c10"/>
  <text x="372" y="205" fill="#323130" font-size="13" font-weight="600">Flaky Tests</text>
  <text x="372" y="226" fill="#605e5c" font-size="11">4 of 128 tests showed mixed results</text>
  <text x="700" y="205" fill="#107c10" font-size="22" font-weight="700" text-anchor="end">3%</text>
  <rect x="712" y="192" width="56" height="22" rx="4" fill="#dff6dd"/>
  <text x="740" y="208" fill="#107c10" font-size="11" font-weight="600" text-anchor="middle">● 85</text>

  <!-- Card 4: Queue Wait -->
  <rect x="352" y="248" width="432" height="56" rx="6" fill="#fff" filter="url(#cardShadow)"/>
  <rect x="352" y="248" width="4" height="56" rx="2" fill="#107c10"/>
  <text x="372" y="269" fill="#323130" font-size="13" font-weight="600">Queue Wait</text>
  <text x="372" y="290" fill="#605e5c" font-size="11">Average time from queued to started</text>
  <text x="700" y="269" fill="#107c10" font-size="22" font-weight="700" text-anchor="end">45s</text>
  <rect x="712" y="256" width="56" height="22" rx="4" fill="#dff6dd"/>
  <text x="740" y="272" fill="#107c10" font-size="11" font-weight="600" text-anchor="middle">● 85</text>

  <!-- Card 5: Failure Clusters -->
  <rect x="352" y="312" width="432" height="56" rx="6" fill="#fff" filter="url(#cardShadow)"/>
  <rect x="352" y="312" width="4" height="56" rx="2" fill="#d83b01"/>
  <text x="372" y="333" fill="#323130" font-size="13" font-weight="600">Failure Clusters</text>
  <text x="372" y="354" fill="#605e5c" font-size="11">2 recurring error patterns detected</text>
  <text x="680" y="333" fill="#d83b01" font-size="22" font-weight="700" text-anchor="end">2</text>
  <text x="680" y="352" fill="#d83b01" font-size="10" text-anchor="end">recurring</text>
  <rect x="712" y="320" width="56" height="22" rx="4" fill="#fde7e9"/>
  <text x="740" y="336" fill="#d83b01" font-size="11" font-weight="600" text-anchor="middle">● 50</text>

  <!-- ============ BOTTOM: Sparkline ============ -->
  <rect x="16" y="424" width="768" height="64" rx="6" fill="#fff" filter="url(#cardShadow)"/>
  <text x="36" y="445" fill="#605e5c" font-size="11" font-weight="600">30-Day Score Trend</text>

  <!-- Sparkline area -->
  <polyline
    points="60,470 84,468 108,465 132,472 156,469 180,462 204,458 228,465 252,470 276,466 300,460 324,455 348,458 372,462 396,456 420,450 444,452 468,455 492,448 516,452 540,458 564,455 588,450 612,448 636,452 660,455 684,450 708,448 732,452 756,454"
    fill="none" stroke="#0078d4" stroke-width="2" stroke-linejoin="round"/>

  <!-- Sparkline dots for start and end -->
  <circle cx="60" cy="470" r="3" fill="#0078d4"/>
  <circle cx="756" cy="454" r="3" fill="#0078d4"/>

  <!-- Sparkline labels -->
  <text x="60" y="486" fill="#a19f9d" font-size="9" text-anchor="middle">30d ago</text>
  <text x="756" y="486" fill="#a19f9d" font-size="9" text-anchor="middle">Today</text>

  <!-- Score range band -->
  <text x="60" y="458" fill="#a19f9d" font-size="8">72</text>
  <text x="756" y="445" fill="#0078d4" font-size="9" font-weight="600">78</text>
</svg>
