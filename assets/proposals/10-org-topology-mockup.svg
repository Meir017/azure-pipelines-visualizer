<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrowOrange" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e67e22"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa" rx="8"/>

  <!-- Filter Bar -->
  <rect x="10" y="10" width="780" height="44" rx="6" fill="#ffffff" stroke="#dee2e6" stroke-width="1" filter="url(#shadow)"/>
  <text x="22" y="36" font-size="12" fill="#6c757d">Project:</text>
  <rect x="70" y="18" width="120" height="28" rx="4" fill="#e9ecef" stroke="#ced4da"/>
  <text x="80" y="37" font-size="11" fill="#495057">All Projects ▾</text>
  <text x="205" y="36" font-size="12" fill="#6c757d">Edges:</text>
  <rect x="248" y="22" width="12" height="12" rx="2" fill="#3498db"/>
  <text x="264" y="35" font-size="10" fill="#495057">Templates</text>
  <rect x="325" y="22" width="12" height="12" rx="2" fill="#e67e22"/>
  <text x="341" y="35" font-size="10" fill="#495057">Triggers</text>
  <rect x="393" y="22" width="12" height="12" rx="2" fill="#9b59b6"/>
  <text x="409" y="35" font-size="10" fill="#495057">Var Groups</text>
  <rect x="540" y="18" width="160" height="28" rx="14" fill="#e9ecef" stroke="#ced4da"/>
  <text x="556" y="37" font-size="11" fill="#adb5bd">🔍 Search pipelines…</text>
  <text x="720" y="37" font-size="11" fill="#0d6efd" font-weight="600" cursor="pointer">⟳ Refresh</text>

  <!-- Project Cluster 1: Platform (blue) -->
  <ellipse cx="180" cy="210" rx="155" ry="120" fill="#3498db" fill-opacity="0.08" stroke="#3498db" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="95" y="115" font-size="11" font-weight="600" fill="#2980b9">Platform</text>

  <!-- Project Cluster 2: Services (green) -->
  <ellipse cx="480" cy="190" rx="160" ry="110" fill="#27ae60" fill-opacity="0.08" stroke="#27ae60" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="395" y="105" font-size="11" font-weight="600" fill="#1e8449">Services</text>

  <!-- Project Cluster 3: Deploy (orange) -->
  <ellipse cx="580" cy="370" rx="150" ry="90" fill="#e67e22" fill-opacity="0.08" stroke="#e67e22" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="510" y="300" font-size="11" font-weight="600" fill="#d35400">Deploy</text>

  <!-- Edges: Template (solid blue) -->
  <line x1="145" y1="180" x2="255" y2="175" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="145" y1="180" x2="170" y2="255" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="400" y1="170" x2="470" y2="155" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="400" y1="170" x2="420" y2="225" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="520" y1="340" x2="560" y2="390" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="520" y1="340" x2="620" y2="345" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Edges: Trigger (dashed orange) -->
  <line x1="275" y1="185" x2="385" y2="170" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <line x1="490" y1="165" x2="510" y2="330" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <line x1="440" y1="230" x2="530" y2="330" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <line x1="185" y1="270" x2="385" y2="170" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>

  <!-- Edges: Var group (purple dotted) -->
  <line x1="265" y1="240" x2="305" y2="310" stroke="#9b59b6" stroke-width="1.2" stroke-dasharray="2,4"/>
  <line x1="420" y1="230" x2="305" y2="310" stroke="#9b59b6" stroke-width="1.2" stroke-dasharray="2,4"/>

  <!-- Variable Group node (diamond) -->
  <polygon points="305,290 325,310 305,330 285,310" fill="#9b59b6" fill-opacity="0.15" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="335" y="314" font-size="8" fill="#7d3c98">deploy-vars</text>

  <!-- Platform Nodes -->
  <rect x="100" y="160" width="90" height="36" rx="6" fill="#ffffff" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
  <text x="115" y="183" font-size="10" font-weight="600" fill="#2c3e50">infra-core</text>

  <rect x="230" y="160" width="80" height="32" rx="6" fill="#ffffff" stroke="#3498db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="244" y="180" font-size="9" fill="#2c3e50">sdk-build</text>

  <rect x="140" y="240" width="85" height="32" rx="6" fill="#ffffff" stroke="#3498db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="260" font-size="9" fill="#2c3e50">base-image</text>

  <rect x="80" y="275" width="70" height="28" rx="6" fill="#ffffff" stroke="#3498db" stroke-width="1" filter="url(#shadow)"/>
  <text x="90" y="293" font-size="8" fill="#2c3e50">lint-ci</text>

  <rect x="215" y="220" width="70" height="28" rx="6" fill="#ffffff" stroke="#3498db" stroke-width="1" filter="url(#shadow)"/>
  <text x="226" y="238" font-size="8" fill="#2c3e50">security</text>

  <!-- Services Nodes -->
  <rect x="360" y="150" width="85" height="36" rx="6" fill="#ffffff" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
  <text x="370" y="173" font-size="10" font-weight="600" fill="#2c3e50">api-gateway</text>

  <rect x="455" y="140" width="90" height="32" rx="6" fill="#ffffff" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="465" y="160" font-size="9" fill="#2c3e50">user-service</text>

  <rect x="385" y="210" width="85" height="32" rx="6" fill="#ffffff" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="393" y="230" font-size="9" fill="#2c3e50">order-service</text>

  <rect x="500" y="195" width="85" height="28" rx="6" fill="#ffffff" stroke="#27ae60" stroke-width="1" filter="url(#shadow)"/>
  <text x="510" y="213" font-size="8" fill="#2c3e50">notification</text>

  <rect x="555" y="155" width="65" height="28" rx="6" fill="#ffffff" stroke="#27ae60" stroke-width="1" filter="url(#shadow)"/>
  <text x="563" y="173" font-size="8" fill="#2c3e50">search</text>

  <!-- Deploy Nodes -->
  <rect x="475" y="320" width="95" height="36" rx="6" fill="#ffffff" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
  <text x="483" y="343" font-size="10" font-weight="600" fill="#2c3e50">deploy-prod</text>

  <rect x="590" y="330" width="85" height="32" rx="6" fill="#ffffff" stroke="#e67e22" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="600" y="350" font-size="9" fill="#2c3e50">deploy-stg</text>

  <rect x="530" y="375" width="80" height="28" rx="6" fill="#ffffff" stroke="#e67e22" stroke-width="1" filter="url(#shadow)"/>
  <text x="540" y="393" font-size="8" fill="#2c3e50">canary-roll</text>

  <rect x="630" y="375" width="75" height="28" rx="6" fill="#ffffff" stroke="#e67e22" stroke-width="1" filter="url(#shadow)"/>
  <text x="640" y="393" font-size="8" fill="#2c3e50">rollback</text>

  <rect x="500" y="415" width="65" height="26" rx="6" fill="#ffffff" stroke="#e67e22" stroke-width="1" filter="url(#shadow)"/>
  <text x="509" y="432" font-size="8" fill="#2c3e50">smoke</text>

  <!-- Mini-map -->
  <rect x="668" y="410" width="120" height="78" rx="4" fill="#ffffff" stroke="#dee2e6" stroke-width="1" fill-opacity="0.92" filter="url(#shadow)"/>
  <text x="676" y="423" font-size="8" fill="#adb5bd">Mini-map</text>
  <!-- Simplified cluster dots -->
  <circle cx="700" cy="445" r="8" fill="#3498db" fill-opacity="0.2" stroke="#3498db" stroke-width="0.5"/>
  <circle cx="730" cy="440" r="9" fill="#27ae60" fill-opacity="0.2" stroke="#27ae60" stroke-width="0.5"/>
  <circle cx="745" cy="465" r="7" fill="#e67e22" fill-opacity="0.2" stroke="#e67e22" stroke-width="0.5"/>
  <!-- Viewport rect -->
  <rect x="690" y="432" width="50" height="35" rx="2" fill="none" stroke="#0d6efd" stroke-width="1.5"/>

  <!-- Legend -->
  <rect x="10" y="460" width="260" height="32" rx="4" fill="#ffffff" stroke="#dee2e6" stroke-width="1" fill-opacity="0.9"/>
  <line x1="20" y1="478" x2="40" y2="478" stroke="#3498db" stroke-width="2"/>
  <text x="44" y="482" font-size="8" fill="#495057">Template</text>
  <line x1="92" y1="478" x2="112" y2="478" stroke="#e67e22" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="116" y="482" font-size="8" fill="#495057">Trigger</text>
  <line x1="155" y1="478" x2="175" y2="478" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="2,3"/>
  <text x="179" y="482" font-size="8" fill="#495057">Var Group</text>
  <text x="234" y="482" font-size="8" fill="#adb5bd">15 pipelines</text>
</svg>
