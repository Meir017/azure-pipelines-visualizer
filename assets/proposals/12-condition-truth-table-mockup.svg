<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa" rx="8"/>

  <!-- Header -->
  <rect x="10" y="10" width="780" height="44" rx="6" fill="#ffffff" stroke="#dee2e6" stroke-width="1" filter="url(#shadow)"/>
  <text x="24" y="38" font-size="14" font-weight="700" fill="#2d3436">Condition Truth Table</text>
  <text x="230" y="38" font-size="11" fill="#636e72">Pipeline: deploy-all • Run #4821 • 4 conditions evaluated</text>

  <!-- Filter chips -->
  <rect x="570" y="20" width="50" height="24" rx="12" fill="#00b894" fill-opacity="0.12" stroke="#00b894" stroke-width="1"/>
  <text x="580" y="36" font-size="10" fill="#00b894">2 ✓</text>
  <rect x="626" y="20" width="50" height="24" rx="12" fill="#d63031" fill-opacity="0.12" stroke="#d63031" stroke-width="1"/>
  <text x="637" y="36" font-size="10" fill="#d63031">2 ✗</text>
  <rect x="682" y="20" width="95" height="24" rx="12" fill="#e9ecef" stroke="#ced4da" stroke-width="1"/>
  <text x="695" y="36" font-size="10" fill="#636e72">🔍 Filter…</text>

  <!-- Table header -->
  <rect x="10" y="62" width="780" height="28" rx="4" fill="#2d3436"/>
  <text x="24" y="80" font-size="10" font-weight="600" fill="#ffffff">Stage / Job</text>
  <text x="160" y="80" font-size="10" font-weight="600" fill="#ffffff">Condition Expression</text>
  <text x="520" y="80" font-size="10" font-weight="600" fill="#ffffff">Variables Used</text>
  <text x="720" y="80" font-size="10" font-weight="600" fill="#ffffff">Result</text>

  <!-- Row 1: Deploy — TRUE -->
  <rect x="10" y="92" width="780" height="38" rx="0" fill="#00b894" fill-opacity="0.05" stroke="#dee2e6" stroke-width="0.5"/>
  <text x="24" y="116" font-size="11" font-weight="600" fill="#2d3436">Deploy</text>
  <text x="24" y="126" font-size="8" fill="#636e72">stage</text>
  <rect x="160" y="100" width="345" height="22" rx="4" fill="#f1f2f6"/>
  <text x="168" y="115" font-size="10" font-family="Consolas, monospace" fill="#2d3436">and(succeeded(), eq(variables['env'], 'prod'))</text>
  <text x="520" y="112" font-size="10" fill="#636e72">env = </text>
  <rect x="552" y="101" width="45" height="18" rx="3" fill="#dfe6e9"/>
  <text x="558" y="114" font-size="10" font-family="Consolas, monospace" fill="#6c5ce7">"prod"</text>
  <circle cx="735" cy="111" r="11" fill="#00b894" fill-opacity="0.15" stroke="#00b894" stroke-width="1.5"/>
  <text x="730" y="115" font-size="12" fill="#00b894">✓</text>
  <text x="753" y="115" font-size="9" fill="#00b894">true</text>

  <!-- Row 2: RunTests — FALSE (highlighted) -->
  <rect x="10" y="132" width="780" height="38" rx="0" fill="#d63031" fill-opacity="0.05" stroke="#d63031" stroke-width="1" stroke-opacity="0.3"/>
  <text x="24" y="156" font-size="11" font-weight="600" fill="#2d3436">RunTests</text>
  <text x="24" y="166" font-size="8" fill="#636e72">job</text>
  <rect x="160" y="140" width="345" height="22" rx="4" fill="#f1f2f6"/>
  <text x="168" y="155" font-size="10" font-family="Consolas, monospace" fill="#2d3436">eq(parameters.runTests, true)</text>
  <text x="520" y="152" font-size="10" fill="#636e72">runTests = </text>
  <rect x="590" y="141" width="42" height="18" rx="3" fill="#ffeaa7"/>
  <text x="596" y="154" font-size="10" font-family="Consolas, monospace" fill="#d63031">false</text>
  <circle cx="735" cy="151" r="11" fill="#d63031" fill-opacity="0.15" stroke="#d63031" stroke-width="1.5"/>
  <text x="731" y="155" font-size="12" fill="#d63031">✗</text>
  <text x="753" y="155" font-size="9" fill="#d63031">false</text>

  <!-- Row 3: Notify — TRUE -->
  <rect x="10" y="172" width="780" height="38" rx="0" fill="#00b894" fill-opacity="0.05" stroke="#dee2e6" stroke-width="0.5"/>
  <text x="24" y="196" font-size="11" font-weight="600" fill="#2d3436">Notify</text>
  <text x="24" y="206" font-size="8" fill="#636e72">step</text>
  <rect x="160" y="180" width="345" height="22" rx="4" fill="#f1f2f6"/>
  <text x="168" y="195" font-size="10" font-family="Consolas, monospace" fill="#2d3436">always()</text>
  <text x="520" y="195" font-size="10" fill="#b2bec3" font-style="italic">— none —</text>
  <circle cx="735" cy="191" r="11" fill="#00b894" fill-opacity="0.15" stroke="#00b894" stroke-width="1.5"/>
  <text x="730" y="195" font-size="12" fill="#00b894">✓</text>
  <text x="753" y="195" font-size="9" fill="#00b894">true</text>

  <!-- Row 4: Rollback — FALSE -->
  <rect x="10" y="212" width="780" height="38" rx="0" fill="#d63031" fill-opacity="0.05" stroke="#dee2e6" stroke-width="0.5"/>
  <text x="24" y="236" font-size="11" font-weight="600" fill="#2d3436">Rollback</text>
  <text x="24" y="246" font-size="8" fill="#636e72">stage</text>
  <rect x="160" y="220" width="345" height="22" rx="4" fill="#f1f2f6"/>
  <text x="168" y="235" font-size="10" font-family="Consolas, monospace" fill="#2d3436">failed()</text>
  <text x="520" y="235" font-size="10" fill="#b2bec3" font-style="italic">— runtime —</text>
  <circle cx="735" cy="231" r="11" fill="#d63031" fill-opacity="0.15" stroke="#d63031" stroke-width="1.5"/>
  <text x="731" y="235" font-size="12" fill="#d63031">✗</text>
  <text x="753" y="235" font-size="9" fill="#d63031">false</text>

  <!-- Divider -->
  <line x1="10" y1="262" x2="790" y2="262" stroke="#dee2e6" stroke-width="1"/>

  <!-- Expression Tree Section Header -->
  <rect x="10" y="270" width="780" height="28" rx="4" fill="#6c5ce7" fill-opacity="0.08" stroke="#6c5ce7" stroke-width="1"/>
  <text x="24" y="289" font-size="11" font-weight="600" fill="#6c5ce7">Expression Tree — Deploy condition</text>
  <text x="280" y="289" font-size="10" fill="#636e72">and(succeeded(), eq(variables['env'], 'prod'))</text>

  <!-- Tree Root: and() -->
  <rect x="320" y="310" width="90" height="32" rx="16" fill="#00b894" fill-opacity="0.15" stroke="#00b894" stroke-width="2" filter="url(#shadow)"/>
  <text x="340" y="330" font-size="11" font-weight="600" fill="#00b894">and(…)</text>
  <text x="415" y="330" font-size="10" fill="#00b894">→ true</text>

  <!-- Edge to succeeded() -->
  <line x1="345" y1="342" x2="200" y2="375" stroke="#b2bec3" stroke-width="1.5"/>
  <!-- Edge to eq() -->
  <line x1="385" y1="342" x2="530" y2="375" stroke="#b2bec3" stroke-width="1.5"/>

  <!-- Left child: succeeded() -->
  <rect x="120" y="375" width="120" height="32" rx="16" fill="#00b894" fill-opacity="0.15" stroke="#00b894" stroke-width="2" filter="url(#shadow)"/>
  <text x="133" y="395" font-size="11" font-weight="600" fill="#00b894">succeeded()</text>
  <text x="245" y="395" font-size="10" fill="#00b894">→ true</text>

  <!-- Right child: eq() -->
  <rect x="470" y="375" width="150" height="32" rx="16" fill="#00b894" fill-opacity="0.15" stroke="#00b894" stroke-width="2" filter="url(#shadow)"/>
  <text x="490" y="395" font-size="11" font-weight="600" fill="#00b894">eq(_, _)</text>
  <text x="625" y="395" font-size="10" fill="#00b894">→ true</text>

  <!-- Edges to eq children -->
  <line x1="510" y1="407" x2="430" y2="438" stroke="#b2bec3" stroke-width="1.5"/>
  <line x1="560" y1="407" x2="610" y2="438" stroke="#b2bec3" stroke-width="1.5"/>

  <!-- eq left leaf: variables['env'] -->
  <rect x="350" y="438" width="150" height="28" rx="6" fill="#dfe6e9" stroke="#b2bec3" stroke-width="1" filter="url(#shadow)"/>
  <text x="360" y="456" font-size="9" font-family="Consolas, monospace" fill="#636e72">variables['env']</text>
  <text x="505" y="456" font-size="10" fill="#6c5ce7">= "prod"</text>

  <!-- eq right leaf: 'prod' -->
  <rect x="570" y="438" width="80" height="28" rx="6" fill="#dfe6e9" stroke="#b2bec3" stroke-width="1" filter="url(#shadow)"/>
  <text x="582" y="456" font-size="10" font-family="Consolas, monospace" fill="#636e72">'prod'</text>
  <text x="655" y="456" font-size="10" fill="#6c5ce7">= "prod"</text>

  <!-- Match indicator between leaves -->
  <text x="530" y="470" font-size="10" fill="#00b894">══ match ══</text>

  <!-- Legend bottom -->
  <rect x="10" y="476" width="280" height="18" rx="3" fill="none"/>
  <circle cx="20" cy="486" r="5" fill="#00b894" fill-opacity="0.3" stroke="#00b894" stroke-width="1"/>
  <text x="30" y="490" font-size="8" fill="#636e72">true</text>
  <circle cx="60" cy="486" r="5" fill="#d63031" fill-opacity="0.3" stroke="#d63031" stroke-width="1"/>
  <text x="70" y="490" font-size="8" fill="#636e72">false</text>
  <circle cx="105" cy="486" r="5" fill="#dfe6e9" stroke="#b2bec3" stroke-width="1"/>
  <text x="115" y="490" font-size="8" fill="#636e72">literal value</text>
  <text x="190" y="490" font-size="8" fill="#b2bec3">Click any row to show its expression tree</text>
</svg>
