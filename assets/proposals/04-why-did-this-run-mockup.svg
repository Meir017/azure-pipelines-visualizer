  <!-- Build Details Section -->
  <text x="20" y="175" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#334155">Build Details</text>

  <!-- Detail rows -->
  <text x="30" y="200" font-family="Segoe UI, sans-serif" font-size="11" fill="#6B7280">Status</text>
  <rect x="120" y="189" width="70" height="18" rx="9" fill="#DCFCE7"/>
  <text x="134" y="202" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#166534">Succeeded</text>

  <text x="30" y="222" font-family="Segoe UI, sans-serif" font-size="11" fill="#6B7280">Branch</text>
  <text x="120" y="222" font-family="Segoe UI Semibold, sans-serif" font-size="11" fill="#334155">refs/heads/main</text>

  <text x="30" y="244" font-family="Segoe UI, sans-serif" font-size="11" fill="#6B7280">Requested by</text>
  <text x="120" y="244" font-family="Segoe UI, sans-serif" font-size="11" fill="#334155">@alice (Alice Johnson)</text>

  <text x="30" y="266" font-family="Segoe UI, sans-serif" font-size="11" fill="#6B7280">Duration</text>
  <text x="120" y="266" font-family="Segoe UI, sans-serif" font-size="11" fill="#334155">4m 32s</text>

  <text x="30" y="288" font-family="Segoe UI, sans-serif" font-size="11" fill="#6B7280">Queued</text>
  <text x="120" y="288" font-family="Segoe UI, sans-serif" font-size="11" fill="#334155">2024-01-15 14:23:01 UTC</text>

  <!-- Right panel: Raw trigger data -->
  <rect x="400" y="162" width="380" height="150" rx="6" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="415" y="182" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#475569">Raw Trigger Data</text>
  <text x="735" y="182" font-family="Segoe UI, sans-serif" font-size="10" fill="#3B82F6" text-decoration="underline">▾ Collapse</text>

  <text x="415" y="200" font-family="Consolas, monospace" font-size="10" fill="#64748B">{</text>
  <text x="425" y="214" font-family="Consolas, monospace" font-size="10" fill="#64748B">"reason": "buildCompletion",</text>
  <text x="425" y="228" font-family="Consolas, monospace" font-size="10" fill="#64748B">"triggerInfo": {</text>
  <text x="435" y="242" font-family="Consolas, monospace" font-size="10" fill="#64748B">"pipelineId": "42",</text>
  <text x="435" y="256" font-family="Consolas, monospace" font-size="10" fill="#64748B">"buildId": "456",</text>
  <text x="435" y="270" font-family="Consolas, monospace" font-size="10" fill="#64748B">"buildResult": "succeeded"</text>
  <text x="425" y="284" font-family="Consolas, monospace" font-size="10" fill="#64748B">}</text>
  <text x="415" y="298" font-family="Consolas, monospace" font-size="10" fill="#64748B">}</text>

  <!-- Divider -->
  <line x1="20" y1="322" x2="780" y2="322" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Example narratives section -->
  <text x="20" y="345" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#334155">Narrative Examples by Trigger Type</text>

  <!-- CI -->
  <rect x="20" y="358" width="245" height="56" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow4)"/>
  <rect x="20" y="358" width="4" height="56" rx="2" fill="#3B82F6"/>
  <text x="34" y="375" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#1E40AF">CI Push</text>
  <text x="34" y="390" font-family="Segoe UI, sans-serif" font-size="9" fill="#475569">Triggered by CI push to main</text>
  <text x="34" y="403" font-family="Segoe UI, sans-serif" font-size="9" fill="#475569">by @alice (abc1234: "Fix login")</text>

  <!-- PR -->
  <rect x="278" y="358" width="245" height="56" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow4)"/>
  <rect x="278" y="358" width="4" height="56" rx="2" fill="#8B5CF6"/>
  <text x="292" y="375" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#6D28D9">Pull Request</text>
  <text x="292" y="390" font-family="Segoe UI, sans-serif" font-size="9" fill="#475569">Triggered by PR #89 — "Add auth"</text>
  <text x="292" y="403" font-family="Segoe UI, sans-serif" font-size="9" fill="#475569">by @bob targeting develop</text>

  <!-- Schedule -->
  <rect x="536" y="358" width="244" height="56" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow4)"/>
  <rect x="536" y="358" width="4" height="56" rx="2" fill="#F59E0B"/>
  <text x="550" y="375" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#B45309">Schedule</text>
  <text x="550" y="390" font-family="Segoe UI, sans-serif" font-size="9" fill="#475569">Scheduled run (0 2 * * *)</text>
  <text x="550" y="403" font-family="Segoe UI, sans-serif" font-size="9" fill="#475569">on refs/heads/main</text>

  <!-- Manual + Completion row -->
  <rect x="20" y="424" width="245" height="56" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow4)"/>
  <rect x="20" y="424" width="4" height="56" rx="2" fill="#22C55E"/>
  <text x="34" y="441" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#166534">Manual</text>
  <text x="34" y="456" font-family="Segoe UI, sans-serif" font-size="9" fill="#475569">Manually queued by @carol</text>
  <text x="34" y="469" font-family="Segoe UI, sans-serif" font-size="9" fill="#475569">on refs/heads/feature/auth</text>

  <rect x="278" y="424" width="245" height="56" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow4)"/>
  <rect x="278" y="424" width="4" height="56" rx="2" fill="#EF4444"/>
  <text x="292" y="441" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#DC2626">Pipeline Completion</text>
  <text x="292" y="456" font-family="Segoe UI, sans-serif" font-size="9" fill="#475569">Triggered by "Build-Core" (#456,</text>
  <text x="292" y="469" font-family="Segoe UI, sans-serif" font-size="9" fill="#475569">succeeded) → Completion trigger</text>

  <rect x="536" y="424" width="244" height="56" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow4)"/>
  <rect x="536" y="424" width="4" height="56" rx="2" fill="#06B6D4"/>
  <text x="550" y="441" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#0E7490">Resource Trigger</text>
  <text x="550" y="456" font-family="Segoe UI, sans-serif" font-size="9" fill="#475569">Triggered by resource "core-lib"</text>
  <text x="550" y="469" font-family="Segoe UI, sans-serif" font-size="9" fill="#475569">(pipeline) — version 2.1.0</text>
</svg>
