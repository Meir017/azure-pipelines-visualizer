  <text x="292" y="98" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#1E40AF">Build-Core</text>
  <text x="362" y="98" font-family="Segoe UI, sans-serif" font-size="12" fill="#1E3A5F">" (build #456, succeeded) → Pipeline Completion trigger</text>

  <!-- Trigger chain label -->
  <text x="72" y="120" font-family="Segoe UI, sans-serif" font-size="11" fill="#6B7280">Trigger chain:</text>

  <!-- Trigger Chain Breadcrumb -->
  <!-- Node 1: Pipeline A -->
  <rect x="160" y="108" width="150" height="24" rx="12" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <circle cx="174" cy="120" r="6" fill="#22C55E"/>
  <text x="184" y="124" font-family="Segoe UI, sans-serif" font-size="11" fill="#1E40AF">CI-Validate (CI push)</text>

  <!-- Arrow 1 -->
  <text x="318" y="124" font-family="Segoe UI, sans-serif" font-size="14" fill="#93C5FD">→</text>

  <!-- Node 2: Pipeline B -->
  <rect x="336" y="108" width="140" height="24" rx="12" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <circle cx="350" cy="120" r="6" fill="#22C55E"/>
  <text x="360" y="124" font-family="Segoe UI, sans-serif" font-size="11" fill="#1E40AF">Build-Core (#456)</text>

  <!-- Arrow 2 -->
  <text x="484" y="124" font-family="Segoe UI, sans-serif" font-size="14" fill="#93C5FD">→</text>

  <!-- Node 3: This Build -->
  <rect x="502" y="108" width="130" height="24" rx="12" fill="#1E40AF"/>
  <text x="520" y="124" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="white">This Build (#1247)</text>

  <!-- Divider -->
