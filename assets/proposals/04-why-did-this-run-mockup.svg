<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="shadow4" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="infoBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EBF5FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="8" fill="#F8FAFC"/>

  <!-- Title bar -->
  <rect width="800" height="44" rx="8" fill="#1E3A5F"/>
  <text x="20" y="28" font-family="Segoe UI, sans-serif" font-size="15" font-weight="600" fill="white">Build Detail — Pipeline: Build-Deploy-App / Run #1247</text>
  <circle cx="760" cy="22" r="8" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="756" y="26" font-family="Segoe UI, sans-serif" font-size="12" fill="#94A3B8">✕</text>

  <!-- "Why did this run?" banner -->
  <rect x="20" y="58" width="760" height="80" rx="8" fill="url(#infoBg)" stroke="#93C5FD" stroke-width="1.5"/>

  <!-- Info icon -->
  <circle cx="48" cy="82" r="14" fill="#3B82F6"/>
  <text x="44" y="87" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="white">i</text>

  <!-- Section title -->
  <text x="72" y="80" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#1E40AF">Why did this run?</text>

  <!-- Narrative text -->
